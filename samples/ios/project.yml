name: LumipolGraphSample
options:
  bundleIdPrefix: com.lumipol
  deploymentTarget:
    iOS: "15.0"
packages:
  LumipolGraphUI:
    path: ../..
targets:
  LumipolGraphSample:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: LumipolGraphUI
        product: LumipolGraphUI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.lumipol.LumipolGraphSample
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
